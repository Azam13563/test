<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Az Cut | Ultra Pro Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        :root {
            --primary: #a855f7;
            --secondary: #3b82f6;
            --accent: #ff0050;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-impact { font-family: 'Inter', sans-serif; font-weight: 900; }

        .glass-ui {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .viewport-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        canvas { width: 100%; height: 100%; object-fit: contain; display: block; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid #fff;
            cursor: pointer;
        }

        .btn-active { 
            background: var(--primary) !important; 
            border-color: #fff !important;
            color: white !important;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, #a855f7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- Auth Shield -->
    <div id="auth-overlay" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-ui rounded-[3rem] p-12 text-center border-purple-500/30">
            <h1 class="text-5xl font-impact italic tracking-tighter mb-2 shimmer-text">AZ CUT</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.5em] uppercase mb-10">Final Ultra v3.0</p>
            <div class="space-y-4">
                <input type="password" id="entry-pin" placeholder="PIN" maxlength="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-4xl font-impact outline-none focus:border-purple-500 text-white">
                <button onclick="bootSystem()" class="w-full bg-white text-black py-6 rounded-2xl font-black text-xl hover:bg-purple-600 hover:text-white transition-all">ENTER ENGINE</button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace" class="hidden opacity-0 flex-1 flex flex-col max-w-[1700px] mx-auto w-full">
        <header class="flex items-center justify-between mb-8 glass-ui p-6 rounded-[2.5rem]">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-impact italic tracking-tighter uppercase">Az <span class="text-purple-500">Cut Ultra</span></h2>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleAudio()" class="w-12 h-12 glass-ui rounded-2xl flex items-center justify-center border-white/5">
                    <i data-lucide="volume-2" id="audio-icon" class="text-purple-400 w-5 h-5"></i>
                </button>
                <button onclick="location.reload()" class="w-12 h-12 glass-ui rounded-2xl flex items-center justify-center border-white/5 text-red-500">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-10 overflow-hidden pb-6">
            <!-- Viewer -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div id="init-upload" onclick="document.getElementById('file-picker').click()" class="viewport-box aspect-[9/16] max-h-[75vh] flex flex-col items-center justify-center border-2 border-dashed border-purple-500/20 cursor-pointer hover:bg-purple-500/5 transition-all">
                    <input type="file" id="file-picker" class="hidden" accept="video/*" onchange="handleVideo(event)">
                    <i data-lucide="plus" class="w-12 h-12 text-purple-500 mb-6"></i>
                    <h3 class="text-2xl font-black italic tracking-tighter">IMPORT HIGHLIGHT</h3>
                </div>

                <div id="video-stage" class="hidden viewport-box aspect-[9/16] max-h-[75vh]">
                    <canvas id="view-canvas"></canvas>
                    <video id="v-hidden" class="hidden" playsinline crossorigin="anonymous"></video>
                </div>
            </div>

            <!-- Controls Panel -->
            <div id="control-panel" class="hidden lg:col-span-4 flex flex-col gap-6 overflow-y-auto pr-2">
                <div class="glass-ui rounded-[3rem] p-8 space-y-10">
                    <!-- Aspect Ratio -->
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Dimensions</p>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="setRatio(false, this)" class="ratio-btn btn-active bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-[10px] uppercase">Original</button>
                            <button onclick="setRatio(true, this)" class="ratio-btn bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-[10px] uppercase italic">9:16 TikTok</button>
                        </div>
                    </div>

                    <!-- Quality Presets -->
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Smart HDR Presets</p>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setPreset(0, this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-xs">BASIC</button>
                            <button onclick="setPreset(2, this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-xs">HDR PRO</button>
                            <button onclick="setPreset(4, this)" class="preset-btn btn-active bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-xs">ULTRA CC</button>
                        </div>
                    </div>

                    <!-- Manual Tuning -->
                    <div class="space-y-8 pt-4">
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[11px] font-black uppercase italic tracking-widest text-gray-400">
                                <span>Saturation الألوان</span>
                                <span id="sat-lbl" class="text-purple-500">1.8x</span>
                            </div>
                            <input type="range" id="sat-rng" min="1" max="3" step="0.1" value="1.8" oninput="applyManual()" class="w-full">
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[11px] font-black uppercase italic tracking-widest text-gray-400">
                                <span>Sharpness الحدة</span>
                                <span id="con-lbl" class="text-blue-500">1.4x</span>
                            </div>
                            <input type="range" id="con-rng" min="1" max="2.5" step="0.05" value="1.4" oninput="applyManual()" class="w-full">
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[11px] font-black uppercase italic tracking-widest text-gray-400">
                                <span>HDR Glow اللمعان</span>
                                <span id="hdr-lbl" class="text-yellow-500">0.25x</span>
                            </div>
                            <input type="range" id="hdr-rng" min="0" max="0.8" step="0.05" value="0.25" oninput="applyManual()" class="w-full">
                        </div>
                    </div>

                    <button onclick="triggerExport()" class="w-full bg-white text-black py-7 rounded-[2.5rem] font-black text-xl italic uppercase hover:bg-purple-600 hover:text-white transition-all shadow-2xl flex items-center justify-center gap-4">
                        <i data-lucide="arrow-down-to-line" class="w-7 h-7"></i>
                        Export 4K HDR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Overlay -->
    <div id="export-modal" class="hidden fixed inset-0 z-[2000] bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center p-12 text-center">
        <h2 class="text-4xl font-impact italic tracking-tighter mb-4 shimmer-text">RENDERING HDR PRO</h2>
        <div class="w-full max-w-md bg-white/5 h-1.5 rounded-full overflow-hidden mb-6">
            <div id="p-bar" class="bg-gradient-to-r from-purple-600 to-blue-500 h-full w-0 transition-all shadow-[0_0_20px_rgba(168,85,247,0.5)]"></div>
        </div>
        <p id="p-text" class="font-impact text-6xl text-white">0%</p>
    </div>

    <script>
        lucide.createIcons();
        const PIN = "2193";
        const video = document.getElementById('v-hidden');
        const canvas = document.getElementById('view-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let isVertical = false;
        let isExporting = false;
        let config = { sat: 1.8, con: 1.4, hdr: 0.25 }; // القيمة الافتراضية للمعة عالية

        function bootSystem() {
            if(document.getElementById('entry-pin').value === PIN) {
                gsap.to("#auth-overlay", { y: -2000, duration: 1.2, ease: "expo.inOut", onComplete: () => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('workspace').classList.remove('hidden');
                    gsap.to("#workspace", { opacity: 1, duration: 1 });
                }});
            }
        }

        function handleVideo(e) {
            const file = e.target.files[0];
            if(!file) return;
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                document.getElementById('init-upload').classList.add('hidden');
                document.getElementById('video-stage').classList.remove('hidden');
                document.getElementById('control-panel').classList.remove('hidden');
                adjustViewport();
                video.play();
                engineLoop();
            };
        }

        function adjustViewport() {
            if(isVertical) { canvas.width = 1080; canvas.height = 1920; }
            else { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
        }

        function setRatio(v, btn) {
            isVertical = v;
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            adjustViewport();
        }

        function setPreset(i, btn) {
            // ملاحظة: هنا ما نغير الكائن بالكامل، بس نعدل القيم عشان لو رجعنا نلاقي نفسنا في مكان مألوف
            const presets = [
                {s:1.3, c:1.1, h:0.1}, {s:1.6, c:1.2, h:0.15}, {s:1.5, c:1.6, h:0.3}, {s:1.9, c:1.3, h:0.2}, {s:2.3, c:1.8, h:0.4}
            ];
            config.sat = presets[i].s;
            config.con = presets[i].c;
            config.hdr = presets[i].h;
            
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            
            syncInputs();
        }

        function applyManual() {
            // المستخدم الحين يعدل يدوياً، نحدث الكائن فوراً
            config.sat = parseFloat(document.getElementById('sat-rng').value);
            config.con = parseFloat(document.getElementById('con-rng').value);
            config.hdr = parseFloat(document.getElementById('hdr-rng').value);
            syncLabels();
        }

        function syncInputs() {
            document.getElementById('sat-rng').value = config.sat;
            document.getElementById('con-rng').value = config.con;
            document.getElementById('hdr-rng').value = config.hdr;
            syncLabels();
        }

        function syncLabels() {
            document.getElementById('sat-lbl').innerText = config.sat + 'x';
            document.getElementById('con-lbl').innerText = config.con + 'x';
            document.getElementById('hdr-lbl').innerText = config.hdr + 'x';
        }

        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let dw, dh, dx, dy;
            if(isVertical) {
                const ratio = video.videoWidth / video.videoHeight;
                dw = canvas.height * ratio; dh = canvas.height;
                dx = (canvas.width - dw) / 2; dy = 0;
            } else {
                dx = 0; dy = 0; dw = canvas.width; dh = canvas.height;
            }

            // الأساس
            ctx.filter = `saturate(${config.sat}) contrast(${config.con}) brightness(1.05)`;
            ctx.drawImage(video, dx, dy, dw, dh);

            // اللمعة "ديك" (Hyper Glow)
            // نستخدم طبقتين بلوم عشان اللمعة تطلع سينمائية
            if(config.hdr > 0) {
                ctx.globalCompositeOperation = 'screen';
                
                // طبقة ناعمة واسعة
                ctx.globalAlpha = config.hdr * 0.6;
                ctx.filter = `blur(20px) brightness(2.0)`;
                ctx.drawImage(video, dx, dy, dw, dh);
                
                // طبقة حادة ضيقة (هنا السر في اللمعة القوية على السلاح)
                ctx.globalAlpha = config.hdr * 0.4;
                ctx.filter = `blur(4px) brightness(2.5) saturate(1.2)`;
                ctx.drawImage(video, dx, dy, dw, dh);
                
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
            }

            // الحدة (Sharpness)
            ctx.globalAlpha = 0.25;
            ctx.filter = `contrast(1.6) grayscale(1)`;
            ctx.drawImage(video, dx - 0.7, dy - 0.7, dw, dh);
            ctx.globalAlpha = 1.0;
            ctx.filter = 'none';
        }

        function engineLoop() {
            if(!isExporting && !video.paused) drawFrame();
            requestAnimationFrame(engineLoop);
        }

        function toggleAudio() {
            video.muted = !video.muted;
            document.getElementById('audio-icon').setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        async function triggerExport() {
            isExporting = true;
            video.pause(); video.currentTime = 0; video.muted = false;
            document.getElementById('export-modal').classList.remove('hidden');
            const stream = canvas.captureStream(60);
            try {
                const vs = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                if(vs.getAudioTracks().length > 0) stream.addTrack(vs.getAudioTracks()[0]);
            } catch(e) {}
            const recorder = new MediaRecorder(stream, { mimeType: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"', videoBitsPerSecond: 50000000 });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Az_HDR_Pro_Final.mp4`;
                a.click();
                location.reload();
            };
            recorder.start();
            video.play();
            const track = () => {
                if(video.ended) { recorder.stop(); return; }
                drawFrame();
                let p = Math.floor((video.currentTime / video.duration) * 100);
                document.getElementById('p-bar').style.width = p + '%';
                document.getElementById('p-text').innerText = p + '%';
                requestAnimationFrame(track);
            };
            track();
        }
    </script>
</body>
</html>
