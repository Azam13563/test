<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Az Cut | TikTok & HDR Photo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        :root {
            --primary: #a855f7;
            --tiktok: #ff0050;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-impact { font-family: 'Inter', sans-serif; font-weight: 900; }

        .glass-ui {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .viewport-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 2.5rem;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        canvas { width: 100%; height: 100%; object-fit: contain; display: block; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px; width: 22px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid #fff;
            cursor: pointer;
        }

        .btn-active { 
            background: var(--primary) !important; 
            color: white !important;
            border-color: #fff !important;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, #a855f7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- Auth Shield -->
    <div id="auth-overlay" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full glass-ui rounded-[3rem] p-12">
            <div class="w-24 h-24 bg-purple-600 rounded-[2rem] mx-auto mb-6 flex items-center justify-center rotate-12 shadow-2xl">
                <i data-lucide="zap" class="w-12 h-12 text-white fill-current"></i>
            </div>
            <h1 class="text-5xl font-impact italic mb-2 shimmer-text">AZ CUT</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.5em] mb-10 uppercase">Hyper Rendering Engine</p>
            <div class="space-y-4">
                <input type="password" id="entry-pin" placeholder="PIN" maxlength="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-4xl font-impact outline-none focus:border-purple-500">
                <button onclick="bootSystem()" class="w-full bg-white text-black py-6 rounded-2xl font-black text-xl hover:bg-purple-600 hover:text-white transition-all">UNLEASH POWER</button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace" class="hidden opacity-0 flex-1 flex flex-col max-w-[1600px] mx-auto w-full">
        <header class="flex items-center justify-between mb-8 glass-ui p-6 rounded-[2.5rem]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-500/20 rounded-xl flex items-center justify-center border border-purple-500/30 text-purple-400">
                    <i data-lucide="video" class="w-5 h-5"></i>
                </div>
                <h2 class="text-xl font-impact italic uppercase">Az <span class="text-purple-500">Ultra</span></h2>
            </div>
            <div class="flex gap-3">
                <button onclick="takeScreenshot()" class="px-5 py-2 glass-ui rounded-xl flex items-center gap-2 text-xs font-bold border-white/10 hover:bg-white/10">
                    <i data-lucide="camera" class="w-4 h-4 text-cyan-400"></i>
                    PHOTO
                </button>
                <button onclick="toggleAudio()" class="w-12 h-12 glass-ui rounded-2xl flex items-center justify-center text-purple-400">
                    <i data-lucide="volume-2" id="audio-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 overflow-hidden pb-4">
            <!-- Viewer Section -->
            <div class="lg:col-span-8 flex flex-col gap-4 overflow-y-auto">
                <div id="init-upload" onclick="document.getElementById('file-picker').click()" class="viewport-box aspect-[9/16] max-h-[75vh] flex flex-col items-center justify-center border-dashed border-2 cursor-pointer border-purple-500/30 group">
                    <input type="file" id="file-picker" class="hidden" accept="video/*" onchange="handleVideo(event)">
                    <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-all">
                        <i data-lucide="plus" class="w-10 h-10 text-purple-500"></i>
                    </div>
                    <h3 class="text-2xl font-black italic tracking-tighter">IMPORT HIGHLIGHT</h3>
                </div>

                <div id="video-stage" class="hidden viewport-box aspect-[9/16] max-h-[75vh]">
                    <canvas id="view-canvas"></canvas>
                    <video id="v-hidden" class="hidden" playsinline crossorigin="anonymous"></video>
                </div>
            </div>

            <!-- Controls Panel -->
            <div id="control-panel" class="hidden lg:col-span-4 flex flex-col gap-6 overflow-y-auto pr-2">
                <div class="glass-ui rounded-[3rem] p-8 space-y-10">
                    
                    <!-- Aspect Ratios (The Return) -->
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Dimensions الأبعاد</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setRatio(false, this)" class="ratio-btn btn-active bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-[10px] uppercase">ORIGINAL</button>
                            <button onclick="setRatio(true, this)" class="ratio-btn bg-white/5 border border-white/10 py-4 rounded-2xl font-bold text-[10px] uppercase italic">9:16 TIKTOK</button>
                        </div>
                    </div>

                    <!-- Smart Presets -->
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">HDR PRO Presets</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setPreset('HDR', this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-xs">ULTRA HDR</button>
                            <button onclick="setPreset('PRO', this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-xs">SHARP PRO</button>
                        </div>
                    </div>

                    <!-- Manual Controls -->
                    <div class="space-y-8">
                        <div class="space-y-4">
                            <div class="flex justify-between text-[11px] font-black uppercase text-gray-400">
                                <span>Saturation الألوان</span>
                                <span id="sat-lbl" class="text-purple-500">1.8</span>
                            </div>
                            <input type="range" id="sat-rng" min="1" max="3" step="0.1" value="1.8" oninput="updateValues()">
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between text-[11px] font-black uppercase text-gray-400">
                                <span>Sharpness الحدة</span>
                                <span id="con-lbl" class="text-blue-500">1.4</span>
                            </div>
                            <input type="range" id="con-rng" min="1" max="2.5" step="0.05" value="1.4" oninput="updateValues()">
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between text-[11px] font-black uppercase text-gray-400">
                                <span>Glow اللمعة ديك</span>
                                <span id="hdr-lbl" class="text-yellow-500">0.3</span>
                            </div>
                            <input type="range" id="hdr-rng" min="0" max="1" step="0.05" value="0.3" oninput="updateValues()">
                        </div>
                    </div>

                    <!-- Export Actions -->
                    <div class="flex flex-col gap-3">
                        <button onclick="triggerExport('gallery')" class="w-full bg-white text-black py-6 rounded-[2rem] font-black text-xl italic uppercase hover:bg-purple-600 hover:text-white transition-all flex items-center justify-center gap-3">
                            <i data-lucide="download" class="w-6 h-6"></i>
                            Save HDR Video
                        </button>
                        <button onclick="triggerExport('tiktok')" class="w-full bg-[#ff0050] text-white py-6 rounded-[2rem] font-black text-xl italic uppercase hover:brightness-110 transition-all flex items-center justify-center gap-3">
                            <i data-lucide="music-2" class="w-6 h-6"></i>
                            Export to TikTok
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Overlay -->
    <div id="export-modal" class="hidden fixed inset-0 z-[2000] bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center p-12 text-center">
        <h2 class="text-4xl font-impact italic mb-8 shimmer-text">PROCESSING HDR MASTER</h2>
        <div class="w-full max-w-sm bg-white/10 h-1.5 rounded-full overflow-hidden mb-6">
            <div id="p-bar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full w-0 transition-all"></div>
        </div>
        <p id="p-text" class="text-6xl font-impact">0%</p>
    </div>

    <script>
        lucide.createIcons();
        const PIN = "2193";
        const video = document.getElementById('v-hidden');
        const canvas = document.getElementById('view-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let isVertical = false;
        let isExporting = false;
        let config = { sat: 1.8, con: 1.4, hdr: 0.3 };

        function bootSystem() {
            if(document.getElementById('entry-pin').value === PIN) {
                gsap.to("#auth-overlay", { y: -1000, duration: 1, ease: "power4.inOut", onComplete: () => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('workspace').classList.remove('hidden');
                    gsap.to("#workspace", { opacity: 1 });
                }});
            }
        }

        function handleVideo(e) {
            const file = e.target.files[0];
            if(!file) return;
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                document.getElementById('init-upload').classList.add('hidden');
                document.getElementById('video-stage').classList.remove('hidden');
                document.getElementById('control-panel').classList.remove('hidden');
                adjustCanvas();
                video.play();
                requestAnimationFrame(mainLoop);
            };
        }

        function adjustCanvas() {
            if(isVertical) {
                canvas.width = 1080; canvas.height = 1920;
            } else {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            }
        }

        function setRatio(v, btn) {
            isVertical = v;
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            adjustCanvas();
        }

        function setPreset(type, btn) {
            if(type === 'HDR') {
                config.sat = 2.1; config.con = 1.35; config.hdr = 0.45;
            } else {
                config.sat = 1.7; config.con = 1.6; config.hdr = 0.2;
            }
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            document.getElementById('sat-rng').value = config.sat;
            document.getElementById('con-rng').value = config.con;
            document.getElementById('hdr-rng').value = config.hdr;
            updateLabels();
        }

        function updateValues() {
            config.sat = document.getElementById('sat-rng').value;
            config.con = document.getElementById('con-rng').value;
            config.hdr = document.getElementById('hdr-rng').value;
            updateLabels();
        }

        function updateLabels() {
            document.getElementById('sat-lbl').innerText = config.sat;
            document.getElementById('con-lbl').innerText = config.con;
            document.getElementById('hdr-lbl').innerText = config.hdr;
        }

        function renderFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let dw, dh, dx, dy;
            if(isVertical) {
                const ratio = video.videoWidth / video.videoHeight;
                dw = canvas.height * ratio; dh = canvas.height;
                dx = (canvas.width - dw) / 2; dy = 0;
            } else {
                dx = 0; dy = 0; dw = canvas.width; dh = canvas.height;
            }

            // CC & Sharpness
            ctx.filter = `saturate(${config.sat}) contrast(${config.con}) brightness(1.05)`;
            ctx.drawImage(video, dx, dy, dw, dh);

            // "اللمعة ديك" - Hyper HDR Glow
            if(config.hdr > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                
                // Bloom 1 (Soft Glow)
                ctx.globalAlpha = config.hdr * 0.6;
                ctx.filter = `blur(15px) brightness(1.8)`;
                ctx.drawImage(canvas, 0, 0);
                
                // Bloom 2 (Sharp Edge Glow for Weapons)
                ctx.globalAlpha = config.hdr * 0.4;
                ctx.filter = `blur(2px) brightness(2.5) saturate(1.2)`;
                ctx.drawImage(canvas, 0, 0);
                
                ctx.restore();
            }

            // Extra Detail Extraction
            ctx.globalAlpha = 0.2;
            ctx.filter = `contrast(1.5) grayscale(1)`;
            ctx.drawImage(video, dx - 1, dy - 1, dw, dh);
            ctx.globalAlpha = 1.0;
            ctx.filter = 'none';
        }

        function mainLoop() {
            if(!isExporting && !video.paused) renderFrame();
            requestAnimationFrame(mainLoop);
        }

        function takeScreenshot() {
            renderFrame();
            const url = canvas.toDataURL('image/png', 1.0);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AzCut_HDR_Shot_${Date.now()}.png`;
            a.click();
            Swal.fire({ title: 'Photo Saved!', text: 'تم حفظ صورة HDR بنجاح', icon: 'success', background: '#111', color: '#fff' });
        }

        async function triggerExport(target) {
            isExporting = true;
            video.pause(); video.currentTime = 0; video.muted = false;
            document.getElementById('export-modal').classList.remove('hidden');
            
            const stream = canvas.captureStream(60);
            try {
                const vs = video.captureStream();
                if(vs.getAudioTracks().length > 0) stream.addTrack(vs.getAudioTracks()[0]);
            } catch(e) {}

            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"',
                videoBitsPerSecond: 50000000 
            });
            
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "AzCut_Ultra_Master.mp4";
                a.click();

                if(target === 'tiktok') {
                    // محاكاة فتح تيك توك
                    setTimeout(() => {
                        window.open('https://www.tiktok.com/upload', '_blank');
                    }, 1000);
                }
                location.reload();
            };

            recorder.start();
            video.play();

            const track = () => {
                if(video.ended) { recorder.stop(); return; }
                renderFrame();
                let p = Math.floor((video.currentTime / video.duration) * 100);
                document.getElementById('p-bar').style.width = p + '%';
                document.getElementById('p-text').innerText = p + '%';
                requestAnimationFrame(track);
            };
            track();
        }

        function toggleAudio() {
            video.muted = !video.muted;
            document.getElementById('audio-icon').setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }
    </script>
</body>
</html>
