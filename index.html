<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZZAM CUT | V3 ENGINE</title>
    <!-- استيراد مكتبات Tailwind و Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- استيراد مكتبة SweetAlert2 الاحترافية -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+Arabic:wght@700;900&display=swap');
        body { background: #030303; color: #fff; font-family: 'Noto Sans Arabic', sans-serif; overflow-x: hidden; }
        .font-pro { font-family: 'Orbitron', sans-serif; }
        .neon-box { box-shadow: 0 0 30px rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); }
        .canvas-container { border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #a855f7; cursor: pointer; box-shadow: 0 0 10px #a855f7; }
    </style>
</head>
<body class="min-h-screen">

    <!-- شاشة الدخول -->
    <div id="lock-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6 transition-all duration-500">
        <div class="w-full max-w-sm bg-[#080808] rounded-[2.5rem] p-10 text-center neon-box">
            <div class="w-20 h-20 bg-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_#a855f7]">
                <i data-lucide="cpu" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-black mb-6 font-pro italic tracking-widest">V3 <span class="text-purple-500">ENGINE</span></h1>
            <input type="password" id="pin-input" placeholder="CODE" maxlength="4" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-center text-3xl font-pro outline-none text-white mb-6 focus:border-purple-500 transition-all">
            <button onclick="checkPin()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xl hover:bg-purple-600 hover:text-white transition-all">تهيئة المحرك</button>
        </div>
    </div>

    <!-- واجهة المستخدم -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700 p-4 md:p-8 max-w-[1400px] mx-auto">
        <header class="flex flex-wrap items-center justify-between mb-8 p-4 md:p-6 bg-[#0a0a0a] rounded-[2rem] border border-white/5">
            <div class="flex items-center gap-3">
                <i data-lucide="activity" class="text-purple-500 w-8 h-8"></i>
                <h1 class="text-2xl font-black font-pro italic">AZZAM <span class="text-purple-500">PRO</span></h1>
            </div>
            <div class="flex items-center gap-2 bg-green-500/10 px-4 py-2 rounded-xl border border-green-500/20">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-green-500 tracking-[0.2em] uppercase">H.264 MP4 Codec Active</span>
            </div>
        </header>

        <div id="upload-zone" class="bg-[#0a0a0a] border-2 border-dashed border-purple-500/30 rounded-[3rem] p-16 md:p-32 text-center cursor-pointer hover:border-purple-500 transition-all group">
            <input type="file" id="video-in" class="hidden" accept="video/*" onchange="handleFile(event)">
            <label for="video-in" class="cursor-pointer block">
                <div class="bg-purple-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="video" class="w-10 h-10 text-purple-500"></i>
                </div>
                <h2 class="text-3xl font-black italic mb-2">استيراد اللقطة</h2>
                <p class="text-gray-500 font-bold text-xs">Supports 60FPS / 4K</p>
            </label>
        </div>

        <div id="editor-zone" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- شاشة العرض (المزامنة الدقيقة) -->
            <div class="lg:col-span-8 relative">
                <div class="canvas-container relative bg-black aspect-[9/16] max-h-[75vh] mx-auto border border-white/10 flex items-center justify-center">
                    <canvas id="preview-canvas" class="w-full h-full object-contain"></canvas>
                    <video id="source-video" class="hidden" playsinline crossorigin="anonymous"></video>
                </div>
            </div>

            <!-- لوحة التحكم -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-[#0a0a0a] rounded-[2.5rem] p-6 md:p-8 border border-white/5 shadow-2xl">
                    <div class="flex items-center justify-between mb-8">
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase italic">Color Grading</span>
                        <button onclick="applyGolden()" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg text-[10px] font-black hover:bg-white transition-all shadow-lg shadow-yellow-500/20">اللون الذهبي 🔥</button>
                    </div>

                    <div class="space-y-8">
                        <!-- التشبع -->
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs font-black uppercase">
                                <span class="text-gray-400">Saturation (الألوان)</span>
                                <span id="val-sat" class="text-purple-500">1.5x</span>
                            </div>
                            <input type="range" id="sat" min="1" max="3" step="0.1" value="1.5" oninput="updateUI()" class="w-full">
                        </div>

                        <!-- التباين -->
                        <div class="space-y-3">
                            <div class="flex justify-between text-xs font-black uppercase">
                                <span class="text-gray-400">Contrast (الحدة)</span>
                                <span id="val-con" class="text-blue-500">1.2x</span>
                            </div>
                            <input type="range" id="con" min="1" max="2" step="0.05" value="1.2" oninput="updateUI()" class="w-full">
                        </div>

                        <button onclick="startExport()" id="render-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-5 rounded-2xl font-black text-xl hover:opacity-90 transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="zap" class="w-5 h-5 fill-current"></i> تصدير للآيباد
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تفعيل أيقونات المكتبة
        lucide.createIcons();
        const pin = "2193";
        const video = document.getElementById('source-video');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true }); // تحسين أداء سحب الفريمات
        
        let isExporting = false;
        let animationFrameId;

        // دالة الدخول
        function checkPin() {
            if(document.getElementById('pin-input').value === pin) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    const app = document.getElementById('app-content');
                    app.classList.remove('hidden');
                    setTimeout(() => app.style.opacity = '1', 50);
                }, 500);
            }
        }

        // معالجة الملف
        function handleFile(e) {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                document.getElementById('upload-zone').classList.add('hidden');
                document.getElementById('editor-zone').classList.remove('hidden');
                
                video.onloadedmetadata = () => {
                    // ضبط أبعاد الكانفاس الحقيقية لتطابق الفيديو (حفاظاً على جودة الـ 4K/1080p)
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    video.loop = true;
                    video.muted = true; // مهم ليعمل التشغيل التلقائي في الآيباد
                    video.play().catch(e => console.log(e));
                    startDrawingLoop();
                };
            }
        }

        // تحديث الأرقام في الواجهة
        function updateUI() {
            document.getElementById('val-sat').innerText = document.getElementById('sat').value + 'x';
            document.getElementById('val-con').innerText = document.getElementById('con').value + 'x';
        }

        // اللمسة الذهبية
        function applyGolden() {
            document.getElementById('sat').value = 2.0;
            document.getElementById('con').value = 1.3;
            updateUI();
        }

        // محرك الرسم (السر الجديد للمزامنة الخالية من التقطيع)
        function drawFrame() {
            if (!isExporting && !video.paused && !video.ended) {
                const sat = document.getElementById('sat').value;
                const con = document.getElementById('con').value;
                
                // تطبيق الفلاتر بذكاء بدون سطوع يخرب الألوان
                ctx.filter = `saturate(${sat}) contrast(${con})`;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            
            // استخدام requestVideoFrameCallback للحصول على الفريم بالضبط عند صدوره (يقضي على التقطيع)
            if ('requestVideoFrameCallback' in video) {
                video.requestVideoFrameCallback(drawFrame);
            } else {
                animationFrameId = requestAnimationFrame(drawFrame);
            }
        }

        function startDrawingLoop() {
            if ('requestVideoFrameCallback' in video) {
                video.requestVideoFrameCallback(drawFrame);
            } else {
                drawFrame();
            }
        }

        // نظام التصدير المطور
        async function startExport() {
            isExporting = true;
            video.loop = false;
            video.pause();
            video.currentTime = 0;

            // استخدام SweetAlert2 لشاشة التحميل الاحترافية
            Swal.fire({
                title: 'جاري التصدير...',
                html: 'الرجاء عدم إغلاق الصفحة<br><br><b id="progress-text" style="color:#a855f7; font-size: 24px;">0%</b>',
                allowOutsideClick: false,
                showConfirmButton: false,
                background: '#0a0a0a',
                color: '#fff',
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            await new Promise(r => setTimeout(r, 500)); // راحة للمتصفح

            // اختيار صيغة MP4 المفضلة لمعالجات الآيباد (تمنع التقطيع تماماً)
            let options = { mimeType: 'video/webm' }; // افتراضي
            const appleCodec = 'video/mp4; codecs="avc1.4d002a"'; // H.264 MP4
            
            if (MediaRecorder.isTypeSupported(appleCodec)) {
                options = { mimeType: appleCodec, videoBitsPerSecond: 15000000 }; // 15Mbps ممتاز جداً ولا يسبب كراش
            } else if (MediaRecorder.isTypeSupported('video/webm; codecs=h264')) {
                options = { mimeType: 'video/webm; codecs=h264', videoBitsPerSecond: 15000000 };
            }

            const stream = canvas.captureStream(60); // 60 إطار في الثانية
            const recorder = new MediaRecorder(stream, options);
            const chunks = [];

            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                const blob = new Blob(chunks, { type: options.mimeType });
                const url = URL.createObjectURL(blob);
                
                isExporting = false;
                
                // إغلاق نافذة التحميل وعرض زر التحميل
                Swal.fire({
                    icon: 'success',
                    title: 'تم التصدير بنجاح!',
                    text: 'الفيديو جاهز بأعلى جودة ممكنة للآيباد',
                    background: '#0a0a0a',
                    color: '#fff',
                    confirmButtonText: 'تحميل الفيديو',
                    confirmButtonColor: '#a855f7',
                    allowOutsideClick: false
                }).then((result) => {
                    if (result.isConfirmed) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `AZZAM_V3_ENGINE.${ext}`;
                        a.click();
                        location.reload(); // إعادة ضبط المحرك بعد التحميل
                    }
                });
            };

            recorder.start();
            video.play();

            // رسم الفريمات بدقة أثناء التصدير لضمان الجودة
            function renderExportFrame() {
                if(video.ended) {
                    recorder.stop();
                    return;
                }

                const sat = document.getElementById('sat').value;
                const con = document.getElementById('con').value;
                ctx.filter = `saturate(${sat}) contrast(${con})`;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                let p = Math.min(Math.floor((video.currentTime / video.duration) * 100), 100);
                document.getElementById('progress-text').innerText = p + '%';

                if(!video.ended) requestAnimationFrame(renderExportFrame);
            }
            
            requestAnimationFrame(renderExportFrame);
        }
    </script>
</body>
</html>
