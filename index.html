<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZZAM CUT | الإصلاح النهائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Arabic:wght@400;900&display=swap');
        body { background: #020202; color: #f0f0f5; font-family: 'Noto Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-pro { font-family: 'Orbitron', sans-serif; }
        .progress-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <!-- شاشة الدخول -->
    <div id="lock-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#0a0a0a] rounded-[2.5rem] p-10 border border-white/5 text-center shadow-2xl">
            <div class="w-16 h-16 bg-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-purple-900/20"><i data-lucide="shield-check" class="text-white"></i></div>
            <h1 class="text-2xl font-black mb-6 font-pro uppercase italic">AZZAM <span class="text-purple-500">AUTH</span></h1>
            <input type="password" id="pin-input" placeholder="••••" maxlength="4" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-center text-3xl tracking-[0.5em] outline-none text-white mb-6 focus:border-purple-500 transition-all">
            <button onclick="checkPin()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xl hover:bg-purple-600 hover:text-white transition-all">فتح المحرك</button>
        </div>
    </div>

    <!-- واجهة البرنامج -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-500 p-4 md:p-10 max-w-2xl mx-auto">
        <header class="flex items-center justify-between mb-8 bg-[#0a0a0a] p-6 rounded-[2rem] border border-white/5">
            <h1 class="text-xl font-black italic font-pro uppercase tracking-tighter">AZZAM CUT <span class="text-purple-500 text-xs">V2.1</span></h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-gray-500 uppercase">System Ready</span>
            </div>
        </header>

        <!-- منطقة الرفع -->
        <div id="upload-zone" class="bg-[#0a0a0a] border-2 border-dashed border-white/10 rounded-[3rem] p-20 text-center hover:border-purple-500/50 transition-all">
            <input type="file" id="video-in" class="hidden" accept="video/*" onchange="handleFile(event)">
            <label for="video-in" class="cursor-pointer block">
                <i data-lucide="clapperboard" class="text-purple-500 w-12 h-12 mx-auto mb-4"></i>
                <h2 class="text-2xl font-black italic mb-2">ارفع لقطتك يا بطل</h2>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Select PUBG Highlight</p>
            </label>
        </div>

        <!-- منطقة المحرر -->
        <div id="editor-zone" class="hidden space-y-6">
            <div class="relative aspect-[9/16] bg-black rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl">
                <canvas id="preview-canvas" width="720" height="1280" class="w-full h-full object-cover"></canvas>
                <video id="source-video" class="hidden" muted playsinline></video>
                
                <!-- طبقة التحميل -->
                <div id="processing-overlay" class="hidden absolute inset-0 bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center p-10 z-50">
                    <div class="relative mb-8">
                        <div class="w-20 h-20 rounded-full border-4 border-purple-500/20 border-t-purple-500 animate-spin"></div>
                        <i data-lucide="zap" class="absolute inset-0 m-auto w-8 h-8 text-yellow-500 fill-current animate-pulse"></i>
                    </div>
                    <h3 class="text-2xl font-black italic mb-2">جاري الحفظ النهائي...</h3>
                    <p class="text-gray-500 text-[10px] mb-8 font-bold uppercase tracking-widest">Saving to iPad Gallery</p>
                    <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden mb-3">
                        <div id="progress-bar" class="bg-gradient-to-r from-purple-600 to-blue-500 h-full w-0 transition-all duration-300 progress-glow"></div>
                    </div>
                    <p id="progress-text" class="text-purple-400 font-black text-2xl font-pro">0%</p>
                </div>
            </div>

            <div class="bg-[#0a0a0a] p-8 rounded-[2.5rem] border border-white/5 space-y-8">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] italic">Color Saturation</span>
                    <button onclick="applyGolden()" class="bg-yellow-500 text-black px-4 py-1 rounded-full text-[10px] font-black shadow-lg shadow-yellow-500/10">اللمسة الذهبية ✨</button>
                </div>
                <input type="range" id="sat" min="1" max="4" step="0.1" value="2.0" oninput="draw()" class="w-full accent-purple-500 h-1.5 bg-white/5 rounded-full appearance-none">
                
                <div id="action-area">
                    <button onclick="renderVideo()" id="render-btn" class="w-full bg-white text-black py-5 rounded-[2rem] font-black text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <i data-lucide="download-cloud" class="w-6 h-6"></i> تصدير المقطع
                    </button>
                </div>

                <div id="download-zone" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4">
                    <div class="bg-green-500/10 border border-green-500/20 p-4 rounded-2xl flex items-center gap-3">
                        <i data-lucide="check-circle" class="text-green-500"></i>
                        <span class="text-green-500 text-xs font-bold">تم التصدير بنجاح يا عزام!</span>
                    </div>
                    <a id="download-link" href="#" download="AZZAM_EDIT.mp4" class="w-full bg-purple-600 text-white py-6 rounded-[2rem] font-black text-xl text-center block shadow-xl">تحميل الفيديو الآن</a>
                    <button onclick="location.reload()" class="w-full text-gray-600 text-[10px] font-bold uppercase tracking-widest py-2">تعديل مقطع جديد</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const pin = "2193";
        const video = document.getElementById('source-video');
        const previewCanvas = document.getElementById('preview-canvas');
        const ctx = previewCanvas.getContext('2d', { alpha: false });
        let isRendering = false;

        function checkPin() {
            if(document.getElementById('pin-input').value === pin) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('app-content').style.opacity = '1', 50);
            }
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if(file) {
                video.src = URL.createObjectURL(file);
                document.getElementById('upload-zone').classList.add('hidden');
                document.getElementById('editor-zone').classList.remove('hidden');
                video.onloadedmetadata = () => {
                    video.loop = true; // نفعله فقط للمعاينة
                    video.play();
                    requestAnimationFrame(draw);
                };
            }
        }

        function draw() {
            if (isRendering) return; // نوقف رسم المعاينة إذا كنا نصدر
            const sat = document.getElementById('sat').value;
            ctx.filter = `saturate(${sat}) contrast(1.25) brightness(1.05)`;
            ctx.drawImage(video, 0, 0, previewCanvas.width, previewCanvas.height);
            if(!video.paused) requestAnimationFrame(draw);
        }

        function applyGolden() {
            document.getElementById('sat').value = 2.8;
            draw();
        }

        async function renderVideo() {
            isRendering = true;
            const overlay = document.getElementById('processing-overlay');
            const progBar = document.getElementById('progress-bar');
            const progText = document.getElementById('progress-text');
            const btn = document.getElementById('render-btn');
            
            overlay.classList.remove('hidden');
            btn.disabled = true;

            // أهم خطوة: إيقاف الـ Loop وإرجاع الفيديو للصفر
            video.loop = false;
            video.pause();
            video.currentTime = 0;

            // ننتظر قليلاً للتأكد أن الفيديو جاهز
            await new Promise(r => setTimeout(r, 500));

            const stream = previewCanvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm;codecs=vp8', 
                videoBitsPerSecond: 12000000 
            });
            
            const chunks = [];
            recorder.ondataavailable = e => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('download-link').href = url;
                document.getElementById('action-area').classList.add('hidden');
                document.getElementById('download-zone').classList.remove('hidden');
                overlay.classList.add('hidden');
                isRendering = false;
            };

            recorder.start();
            video.play();

            const trackProgress = () => {
                // شرط الإيقاف الصارم: إذا وصل الفيديو للنهاية
                if(video.ended) {
                    recorder.stop();
                    video.pause();
                    return;
                }

                // رسم الفريمات أثناء التصدير
                const sat = document.getElementById('sat').value;
                ctx.filter = `saturate(${sat}) contrast(1.25) brightness(1.05)`;
                ctx.drawImage(video, 0, 0, previewCanvas.width, previewCanvas.height);

                let p = Math.min(Math.floor((video.currentTime / video.duration) * 100), 100);
                progBar.style.width = p + '%';
                progText.innerText = p + '%';
                
                if (!video.ended) requestAnimationFrame(trackProgress);
            };
            
            trackProgress();
        }
    </script>
</body>
</html>
