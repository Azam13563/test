<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Az Cut | Ultra Pro Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        :root {
            --primary: #a855f7;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-impact { font-family: 'Inter', sans-serif; font-weight: 900; }

        .glass-ui {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .viewport-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        canvas { width: 100%; height: 100%; object-fit: contain; display: block; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px; width: 22px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid #fff;
            cursor: pointer;
        }

        .btn-active { 
            background: var(--primary) !important; 
            color: white !important;
            border-color: #fff !important;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, #a855f7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- Auth Shield -->
    <div id="auth-overlay" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-ui rounded-[3rem] p-12 text-center">
            <h1 class="text-5xl font-impact italic mb-2 shimmer-text">AZ CUT</h1>
            <p class="text-gray-500 text-[10px] font-bold tracking-[0.5em] mb-10 uppercase">Ultra Engine v3.1</p>
            <div class="space-y-4">
                <input type="password" id="entry-pin" placeholder="PIN" maxlength="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-4xl font-impact outline-none focus:border-purple-500">
                <button onclick="bootSystem()" class="w-full bg-white text-black py-6 rounded-2xl font-black text-xl hover:bg-purple-600 hover:text-white transition-all">START ENGINE</button>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="workspace" class="hidden opacity-0 flex-1 flex flex-col max-w-[1400px] mx-auto w-full">
        <header class="flex items-center justify-between mb-8 glass-ui p-6 rounded-[2.5rem]">
            <h2 class="text-xl font-impact italic uppercase">Az <span class="text-purple-500">Cut Ultra</span></h2>
            <div class="flex gap-3">
                <button onclick="toggleAudio()" class="w-12 h-12 glass-ui rounded-2xl flex items-center justify-center">
                    <i data-lucide="volume-2" id="audio-icon" class="text-purple-400 w-5 h-5"></i>
                </button>
                <button onclick="location.reload()" class="w-12 h-12 glass-ui rounded-2xl flex items-center justify-center text-red-500">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 overflow-hidden">
            <!-- Viewer -->
            <div class="lg:col-span-7 flex flex-col gap-4">
                <div id="init-upload" onclick="document.getElementById('file-picker').click()" class="viewport-box aspect-[9/16] flex flex-col items-center justify-center border-dashed border-2 cursor-pointer border-purple-500/30">
                    <input type="file" id="file-picker" class="hidden" accept="video/*" onchange="handleVideo(event)">
                    <i data-lucide="upload-cloud" class="w-12 h-12 text-purple-500 mb-4"></i>
                    <h3 class="text-xl font-bold italic">IMPORT VIDEO</h3>
                </div>

                <div id="video-stage" class="hidden viewport-box aspect-[9/16]">
                    <canvas id="view-canvas"></canvas>
                    <video id="v-hidden" class="hidden" playsinline crossorigin="anonymous"></video>
                </div>
            </div>

            <!-- Controls -->
            <div id="control-panel" class="hidden lg:col-span-5 flex flex-col gap-6">
                <div class="glass-ui rounded-[3rem] p-8 space-y-8">
                    
                    <!-- Smart Filters -->
                    <div class="space-y-4">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Engine Presets</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setPreset('HDR', this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-sm">HDR MODE</button>
                            <button onclick="setPreset('PRO', this)" class="preset-btn bg-white/5 border border-white/10 p-4 rounded-xl font-impact italic text-sm">PRO MODE</button>
                        </div>
                    </div>

                    <!-- Manual Controls -->
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between text-[11px] font-bold text-gray-400 uppercase">
                                <span>Saturation الألوان</span>
                                <span id="sat-lbl" class="text-purple-500">1.8</span>
                            </div>
                            <input type="range" id="sat-rng" min="1" max="3" step="0.1" value="1.8" oninput="updateValues()">
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between text-[11px] font-bold text-gray-400 uppercase">
                                <span>Sharpness الحدة</span>
                                <span id="con-lbl" class="text-blue-500">1.4</span>
                            </div>
                            <input type="range" id="con-rng" min="1" max="2.5" step="0.05" value="1.4" oninput="updateValues()">
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between text-[11px] font-bold text-gray-400 uppercase">
                                <span>Glow اللمعة</span>
                                <span id="hdr-lbl" class="text-yellow-500">0.3</span>
                            </div>
                            <input type="range" id="hdr-rng" min="0" max="1" step="0.05" value="0.3" oninput="updateValues()">
                        </div>
                    </div>

                    <button onclick="triggerExport()" class="w-full bg-white text-black py-6 rounded-3xl font-black text-xl italic uppercase hover:bg-purple-600 hover:text-white transition-all flex items-center justify-center gap-3">
                        <i data-lucide="download" class="w-6 h-6"></i>
                        Export 4K HDR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Overlay -->
    <div id="export-modal" class="hidden fixed inset-0 z-[2000] bg-black flex flex-col items-center justify-center p-12">
        <h2 class="text-3xl font-impact italic mb-8 shimmer-text">RENDERING VIDEO...</h2>
        <div class="w-full max-w-sm bg-white/10 h-1.5 rounded-full overflow-hidden mb-4">
            <div id="p-bar" class="bg-purple-500 h-full w-0 shadow-[0_0_15px_#a855f7]"></div>
        </div>
        <p id="p-text" class="text-5xl font-impact">0%</p>
    </div>

    <script>
        lucide.createIcons();
        const PIN = "2193";
        const video = document.getElementById('v-hidden');
        const canvas = document.getElementById('view-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let isExporting = false;
        // القيم محفوظة في كائن مركزي لا يصفر عند التبديل
        let config = { sat: 1.8, con: 1.4, hdr: 0.3 };

        function bootSystem() {
            if(document.getElementById('entry-pin').value === PIN) {
                gsap.to("#auth-overlay", { y: -1000, duration: 1, ease: "power4.inOut", onComplete: () => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('workspace').classList.remove('hidden');
                    gsap.to("#workspace", { opacity: 1 });
                }});
            }
        }

        function handleVideo(e) {
            const file = e.target.files[0];
            if(!file) return;
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                document.getElementById('init-upload').classList.add('hidden');
                document.getElementById('video-stage').classList.remove('hidden');
                document.getElementById('control-panel').classList.remove('hidden');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                video.play();
                requestAnimationFrame(loop);
            };
        }

        function setPreset(type, btn) {
            // تحديث القيم بناء على النمط مع الحفاظ على البنية
            if(type === 'HDR') {
                config.sat = 2.0; config.con = 1.3; config.hdr = 0.45;
            } else {
                config.sat = 1.6; config.con = 1.6; config.hdr = 0.25;
            }
            
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            
            // تحديث السلايدرز لتطابق القيم الجديدة
            document.getElementById('sat-rng').value = config.sat;
            document.getElementById('con-rng').value = config.con;
            document.getElementById('hdr-rng').value = config.hdr;
            updateLabels();
        }

        function updateValues() {
            config.sat = document.getElementById('sat-rng').value;
            config.con = document.getElementById('con-rng').value;
            config.hdr = document.getElementById('hdr-rng').value;
            updateLabels();
        }

        function updateLabels() {
            document.getElementById('sat-lbl').innerText = config.sat;
            document.getElementById('con-lbl').innerText = config.con;
            document.getElementById('hdr-lbl').innerText = config.hdr;
        }

        function loop() {
            if(!isExporting && !video.paused) {
                render();
            }
            requestAnimationFrame(loop);
        }

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // الطبقة الأساسية (تعديل الألوان والحدة)
            ctx.filter = `saturate(${config.sat}) contrast(${config.con}) brightness(1.05)`;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // نظام اللمعة "ديك" المتطور
            if(config.hdr > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                // وهج ناعم (Bloom)
                ctx.globalAlpha = config.hdr * 0.5;
                ctx.filter = `blur(15px) brightness(1.5)`;
                ctx.drawImage(canvas, 0, 0);
                
                // وهج حاد للمناطق الساطعة (Specular Highlight)
                ctx.globalAlpha = config.hdr * 0.4;
                ctx.filter = `blur(2px) brightness(2.0) saturate(1.5)`;
                ctx.drawImage(canvas, 0, 0);
                ctx.restore();
            }
        }

        async function triggerExport() {
            isExporting = true;
            video.pause(); video.currentTime = 0;
            document.getElementById('export-modal').classList.remove('hidden');
            
            const stream = canvas.captureStream(60);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/mp4', videoBitsPerSecond: 25000000 });
            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "AzCut_Ultra_HDR.mp4";
                a.click();
                location.reload();
            };

            recorder.start();
            video.play();

            const track = () => {
                if(video.ended) { recorder.stop(); return; }
                render();
                let p = Math.floor((video.currentTime / video.duration) * 100);
                document.getElementById('p-bar').style.width = p + '%';
                document.getElementById('p-text').innerText = p + '%';
                requestAnimationFrame(track);
            };
            track();
        }

        function toggleAudio() {
            video.muted = !video.muted;
            document.getElementById('audio-icon').setAttribute('data-lucide', video.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }
    </script>
</body>
</html>
