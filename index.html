<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>حنكها - نظام اللاعبين</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background-color: #09090B; color: white; margin: 0; overflow-x: hidden; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .btn-primary { background: #06b6d4; transition: all 0.3s; }
    .btn-primary:hover { background: #0891b2; transform: translateY(-2px); }
    .avatar-box { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- تحميل مكتبات Firebase بشكل مباشر ومتوافق -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
    
    // جعلها متاحة لـ Babel
    window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion };
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { User, Play, Crown, ArrowRight, Loader2, Sparkles, SmilePlus } from 'https://esm.sh/lucide-react@0.344.0';

    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } = window.fb;

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyBeJzb9lETAsfeby6hZUZERU4xTAAdzELY",
      authDomain: "hankha-ae305.firebaseapp.com",
      projectId: "hankha-ae305",
      storageBucket: "hankha-ae305.firebasestorage.app",
      messagingSenderId: "272262200881",
      appId: "1:272262200881:web:25a29143b80543960b9f10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const AVATARS = ['🦁', '🐯', '🦊', '🐻', '🐼', '🐨', '🐸', '🐙', '🦖', '🦄'];
    const COLORS = ['#06b6d4', '#a855f7', '#f97316', '#22c55e', '#ef4444', '#eab308', '#ec4899', '#6366f1', '#14b8a6', '#f43f5e'];

    const App = () => {
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [isRegistered, setIsRegistered] = useState(false);
      const [view, setView] = useState('main'); 
      const [room, setRoom] = useState(null);
      const [roomCode, setRoomCode] = useState('');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u) {
            setUser(u);
            setLoading(false);
          } else {
            signInAnonymously(auth);
          }
        });
        return () => unsubscribe();
      }, []);

      const handleRegister = (e) => {
        e.preventDefault();
        if (playerName.trim().length < 2) return;
        setIsRegistered(true);
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('room');
        if (code) joinRoom(code.toUpperCase());
      };

      const createRoom = async () => {
        setLoading(true);
        const code = Math.random().toString(36).substring(2, 7).toUpperCase();
        const roomRef = doc(db, 'rooms', code);
        await setDoc(roomRef, {
          code,
          host: user.uid,
          players: [{ 
            id: user.uid, 
            name: playerName, 
            avatar: AVATARS[0], 
            color: COLORS[0],
            score: 0 
          }],
          settings: { players: 10 },
          status: 'waiting'
        });
        setRoomCode(code);
        setView('lobby');
        setLoading(false);
      };

      const joinRoom = async (code) => {
        const roomRef = doc(db, 'rooms', code.toUpperCase());
        try {
          const snap = await getDoc(roomRef);
          if (snap.exists()) {
            const data = snap.data();
            if (!data.players.find(p => p.id === user.uid)) {
              const index = data.players.length;
              await updateDoc(roomRef, {
                players: arrayUnion({
                  id: user.uid,
                  name: playerName,
                  avatar: AVATARS[index % 10],
                  color: COLORS[index % 10],
                  score: 0
                })
              });
            }
            setRoomCode(code.toUpperCase());
            setView('lobby');
          } else {
            alert("الغرفة غير موجودة");
          }
        } catch (err) {
          console.error(err);
        }
      };

      useEffect(() => {
        if (!roomCode) return;
        const unsubscribe = onSnapshot(doc(db, 'rooms', roomCode), (snap) => {
          if (snap.exists()) setRoom(snap.data());
        });
        return () => unsubscribe();
      }, [roomCode]);

      if (loading) return (
        <div className="h-screen bg-black flex flex-col items-center justify-center gap-4">
          <Loader2 className="animate-spin text-cyan-500" size={50} />
          <p className="text-gray-500 font-bold">جاري الاتصال بالسيرفر...</p>
        </div>
      );

      if (!isRegistered) {
        return (
          <div className="h-screen flex flex-col items-center justify-center p-6 bg-[#09090B]">
            <div className="w-full max-w-sm glass p-8 rounded-[3rem] text-center space-y-8 animate-in zoom-in">
              <div className="bg-cyan-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                <SmilePlus size={40} className="text-cyan-400" />
              </div>
              <div>
                <h2 className="text-3xl font-black mb-2">من أنت؟</h2>
                <p className="text-gray-500 font-bold text-sm">سجل اسمك لتبدأ التحدي</p>
              </div>
              <form onSubmit={handleRegister} className="space-y-4">
                <input 
                  autoFocus
                  required
                  placeholder="اكتب اسمك هنا..." 
                  className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-center text-xl font-black outline-none focus:border-cyan-500 transition-all text-white"
                  value={playerName}
                  onChange={(e) => setPlayerName(e.target.value)}
                />
                <button type="submit" className="w-full btn-primary p-5 rounded-2xl font-black text-xl flex items-center justify-center gap-2 text-white">
                  دخول <ArrowRight size={20} />
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen max-w-md mx-auto p-4 flex flex-col overflow-hidden">
          {view === 'main' && (
            <div className="flex-1 flex flex-col items-center justify-center space-y-12">
              <div className="text-center">
                <h1 className="text-7xl font-black italic tracking-tighter text-white drop-shadow-2xl">حـنكـها</h1>
                <div className="flex items-center justify-center gap-2 mt-2 bg-white/5 py-1 px-4 rounded-full border border-white/5">
                  <span className="text-cyan-400 font-bold uppercase text-[10px] tracking-widest">أهلاً بك:</span>
                  <span className="text-white font-black text-xs">{playerName}</span>
                </div>
              </div>
              <div className="w-full space-y-4 px-4">
                <button onClick={createRoom} className="w-full btn-primary p-6 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-3 shadow-xl shadow-cyan-900/20 text-white">
                  إنشاء غرفة
                </button>
                <div className="flex gap-2">
                  <input id="joinInp" placeholder="رمز الغرفة" className="flex-1 glass p-5 rounded-[1.5rem] text-center font-black text-xl uppercase outline-none focus:border-cyan-500 text-white" />
                  <button onClick={() => joinRoom(document.getElementById('joinInp').value)} className="bg-white text-black p-5 rounded-[1.5rem] font-black"><ArrowRight /></button>
                </div>
              </div>
            </div>
          )}

          {view === 'lobby' && room && (
            <div className="flex-1 space-y-6 overflow-y-auto pt-4 pb-20">
              <div className="glass p-6 rounded-[2.5rem] flex justify-between items-center">
                <div>
                  <span className="text-[10px] font-black text-cyan-500 uppercase tracking-widest block mb-1">كود الدخول</span>
                  <h2 className="text-5xl font-black tracking-tighter leading-none">{roomCode}</h2>
                </div>
                <div className="bg-white p-2 rounded-2xl">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${window.location.origin}${window.location.pathname}?room=${roomCode}`} className="w-14 h-14" />
                </div>
              </div>

              <div className="space-y-3">
                <h3 className="px-2 text-xs font-black text-gray-500 uppercase flex justify-between">
                  <span>اللاعبين المستعدين</span>
                  <span>{room.players.length} / 10</span>
                </h3>
                
                <div className="grid grid-cols-1 gap-3">
                  {room.players.map((p, i) => (
                    <div key={i} className="glass p-4 rounded-[1.8rem] flex items-center gap-4 animate-in slide-in-from-right-4" style={{ borderRight: `4px solid ${p.color}` }}>
                      <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl avatar-box shadow-inner" style={{ backgroundColor: `${p.color}20` }}>
                        {p.avatar}
                      </div>
                      <div className="flex-1">
                        <p className="font-black text-lg text-white">{p.name} {p.id === user.uid && <span className="text-[10px] text-cyan-500">(أنت)</span>}</p>
                        <p className="text-[10px] text-gray-500 font-bold uppercase">جاهز للعب</p>
                      </div>
                      {p.id === room.host && <Crown className="text-yellow-500" size={20} />}
                    </div>
                  ))}
                </div>
              </div>

              {user.uid === room.host && (
                <div className="fixed bottom-6 left-4 right-4 max-w-md mx-auto">
                   <button className="w-full bg-white text-black py-6 rounded-[2rem] font-black text-xl shadow-2xl active:scale-95 transition-all">بدء المباراة الآن</button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
