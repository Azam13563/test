<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Az Cut | Realistic HDR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        :root {
            --primary: #fbbf24;
            --bg: #080808;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .font-impact { font-family: 'Inter', sans-serif; font-weight: 900; }

        .glass-card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast; /* تعزيز الحدة من المتصفح */
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 5px;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .btn-logic {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
            color: #888;
        }

        .btn-logic.active {
            background: var(--primary);
            color: #000;
            font-weight: 900;
            border-color: #fff;
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, #fbbf24, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6">

    <!-- Entry Shield -->
    <div id="auth-gate" class="fixed inset-0 z-[5000] bg-black flex items-center justify-center p-6">
        <div class="max-w-xs w-full glass-card rounded-[2rem] p-8 text-center">
            <h1 class="text-3xl font-impact italic shimmer-text mb-6 uppercase tracking-tighter">AZ CUT REAL</h1>
            <input type="password" id="pin" placeholder="PIN" maxlength="4" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-center text-2xl font-impact outline-none focus:border-yellow-500 mb-4">
            <button onclick="unlock()" class="w-full bg-yellow-500 text-black py-3 rounded-xl font-black uppercase text-sm">Access Engine</button>
        </div>
    </div>

    <!-- Interface -->
    <div id="app" class="hidden opacity-0 flex flex-col h-full gap-4">
        <!-- Top Bar -->
        <header class="flex items-center justify-between glass-card p-4 rounded-2xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="camera" class="text-black w-4 h-4"></i>
                </div>
                <h2 class="font-impact italic text-lg uppercase tracking-tight">Az <span class="text-yellow-500">Realistic</span></h2>
            </div>
            <button onclick="location.reload()" class="text-gray-500"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </header>

        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
            <!-- Main Display -->
            <div class="lg:col-span-8 flex flex-col gap-4 min-h-0">
                <div id="upload-box" onclick="document.getElementById('input-file').click()" class="viewport-wrapper border-2 border-dashed border-white/5 cursor-pointer hover:bg-white/5">
                    <input type="file" id="input-file" class="hidden" accept="video/*" onchange="initVideo(event)">
                    <div class="text-center">
                        <i data-lucide="upload-cloud" class="w-12 h-12 text-yellow-500/50 mx-auto mb-2"></i>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Import RAW Gameplay</p>
                    </div>
                </div>

                <div id="player-box" class="hidden viewport-wrapper">
                    <canvas id="canvas-main"></canvas>
                </div>
            </div>

            <!-- Side Controls -->
            <div id="sidebar" class="hidden lg:col-span-4 flex flex-col gap-4 overflow-y-auto pr-1">
                <div class="glass-card rounded-[2rem] p-6 space-y-8">
                    
                    <!-- Aspect -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Dimensions</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setDim(0, this)" class="dim-btn btn-logic active p-3 rounded-xl text-[10px] font-bold">ORIGINAL</button>
                            <button onclick="setDim(1, this)" class="dim-btn btn-logic p-3 rounded-xl text-[10px] font-bold">VERTICAL 9:16</button>
                        </div>
                    </div>

                    <!-- Presets -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Balanced Presets</p>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="applyP(0, this)" class="p-btn btn-logic p-3 rounded-xl text-[10px] font-impact">SOFT</button>
                            <button onclick="applyP(1, this)" class="p-btn btn-logic p-3 rounded-xl text-[10px] font-impact">BAL</button>
                            <button onclick="applyP(2, this)" class="p-btn btn-logic active p-3 rounded-xl text-[10px] font-impact">HDR</button>
                            <button onclick="applyP(3, this)" class="p-btn btn-logic p-3 rounded-xl text-[10px] font-impact">PRO</button>
                        </div>
                    </div>

                    <!-- Logic Sliders -->
                    <div class="space-y-6 pt-2">
                        <div class="space-y-3">
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-gray-400">MICRO-CONTRAST (SHARP)</span>
                                <span id="val-shp" class="text-yellow-500">1.2</span>
                            </div>
                            <input type="range" id="rng-shp" min="0" max="2.5" step="0.1" value="1.2" oninput="manualUpdate()" class="range-slider">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-gray-400">VIVID COLORS</span>
                                <span id="val-sat" class="text-yellow-500">1.4</span>
                            </div>
                            <input type="range" id="rng-sat" min="1" max="2.2" step="0.05" value="1.4" oninput="manualUpdate()" class="range-slider">
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-gray-400">LUMINANCE (EXPOSURE)</span>
                                <span id="val-exp" class="text-yellow-500">1.05</span>
                            </div>
                            <input type="range" id="rng-exp" min="0.9" max="1.3" step="0.02" value="1.05" oninput="manualUpdate()" class="range-slider">
                        </div>
                    </div>

                    <button onclick="exportVideo()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg italic hover:bg-yellow-500 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="share" class="w-5 h-5"></i>
                        EXPORT REAL HDR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Overlay -->
    <div id="overlay-export" class="hidden fixed inset-0 z-[6000] bg-black/98 flex flex-col items-center justify-center p-10">
        <div class="w-20 h-20 border-4 border-yellow-500/10 border-t-yellow-500 rounded-full animate-spin mb-6"></div>
        <h2 class="text-xl font-impact italic shimmer-text uppercase mb-2">Encoding Realistic HDR</h2>
        <p id="pct" class="text-5xl font-impact text-white mb-6">0%</p>
        <div class="w-full max-w-xs h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="bar" class="h-full bg-yellow-500 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <video id="v-raw" class="hidden" playsinline crossorigin="anonymous"></video>

    <script>
        lucide.createIcons();
        const pinCode = "2193";
        const v = document.getElementById('v-raw');
        const c = document.getElementById('canvas-main');
        const ctx = c.getContext('2d');
        
        let isVertical = false;
        let config = { sat: 1.4, shp: 1.2, exp: 1.05 };
        let isExporting = false;

        function unlock() {
            if(document.getElementById('pin').value === pinCode) {
                gsap.to("#auth-gate", { opacity: 0, scale: 1.2, duration: 0.6, onComplete: () => {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    gsap.to("#app", { opacity: 1, duration: 0.5 });
                }});
            } else {
                Swal.fire({ icon: 'error', title: 'Wrong PIN', background: '#111', color: '#fff' });
            }
        }

        function initVideo(e) {
            const file = e.target.files[0];
            if(!file) return;
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                document.getElementById('upload-box').style.display = 'none';
                document.getElementById('player-box').classList.remove('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                resizeCanvas();
                v.play();
                loop();
            };
        }

        function resizeCanvas() {
            if(isVertical) {
                c.width = 1080;
                c.height = 1920;
            } else {
                c.width = v.videoWidth;
                c.height = v.videoHeight;
            }
        }

        function setDim(mode, btn) {
            isVertical = (mode === 1);
            document.querySelectorAll('.dim-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            resizeCanvas();
        }

        function applyP(i, btn) {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const p = [
                {s: 1.15, p: 0.5, e: 1.0},
                {s: 1.3, p: 1.0, e: 1.02},
                {s: 1.5, p: 1.4, e: 1.05},
                {s: 1.7, p: 2.0, e: 1.1}
            ];
            config = p[i];
            syncUI();
        }

        function manualUpdate() {
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            config.sat = document.getElementById('rng-sat').value;
            config.shp = document.getElementById('rng-shp').value;
            config.exp = document.getElementById('rng-exp').value;
            syncUI();
        }

        function syncUI() {
            document.getElementById('val-sat').innerText = config.sat;
            document.getElementById('val-shp').innerText = config.shp;
            document.getElementById('val-exp').innerText = config.exp;
            document.getElementById('rng-sat').value = config.sat;
            document.getElementById('rng-shp').value = config.shp;
            document.getElementById('rng-exp').value = config.exp;
        }

        function process() {
            ctx.clearRect(0,0,c.width,c.height);
            
            let dw, dh, dx, dy;
            const screenRatio = c.width / c.height;
            const videoRatio = v.videoWidth / v.videoHeight;

            if (videoRatio > screenRatio) {
                dw = c.width;
                dh = c.width / videoRatio;
                dx = 0;
                dy = (c.height - dh) / 2;
            } else {
                dh = c.height;
                dw = c.height * videoRatio;
                dx = (c.width - dw) / 2;
                dy = 0;
            }

            // --- محرك المعالجة المنطقي ---
            // 1. الأساس: الألوان والإضاءة (تعديل ناعم)
            ctx.filter = `saturate(${config.sat}) brightness(${config.exp}) contrast(1.08)`;
            ctx.drawImage(v, dx, dy, dw, dh);

            // 2. تقنية الـ Smart Sharpness (Micro-contrast)
            // نستخدم طبقة ثانية شفافة بفلتر عالي التباين لتعزيز الحواف فقط دون حرق الألوان
            if(config.shp > 0) {
                ctx.globalAlpha = config.shp * 0.08; // نسبة خفيفة جداً لضمان عدم الاحتراق
                ctx.globalCompositeOperation = 'overlay';
                ctx.filter = `contrast(2) brightness(1.1) grayscale(1) blur(0.5px)`;
                ctx.drawImage(v, dx, dy, dw, dh);
                
                // تعزيز الحواف الدقيقة
                ctx.globalAlpha = config.shp * 0.12;
                ctx.globalCompositeOperation = 'soft-light';
                ctx.drawImage(v, dx, dy, dw, dh);
            }

            // إعادة القيم للوضع الطبيعي
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = 'none';
        }

        function loop() {
            if(!v.paused && !isExporting) process();
            requestAnimationFrame(loop);
        }

        function exportVideo() {
            isExporting = true;
            v.pause();
            v.currentTime = 0;
            document.getElementById('overlay-export').classList.remove('hidden');

            const stream = c.captureStream(60);
            const recorder = new MediaRecorder(stream, {
                mimeType: 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"',
                videoBitsPerSecond: 40000000 // جودة عالية ومنطقية
            });

            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/mp4'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `AZ_Realistic_HDR.mp4`;
                a.click();
                location.reload();
            };

            recorder.start();
            v.play();

            const track = () => {
                if(v.ended) { recorder.stop(); return; }
                process();
                let p = Math.floor((v.currentTime / v.duration) * 100);
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('pct').innerText = p + '%';
                requestAnimationFrame(track);
            };
            track();
        }
    </script>
</body>
</html>
